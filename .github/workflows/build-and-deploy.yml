name: Deploy API

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:

  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: us-east-1
      AWS_ROLE_TO_ASSUME: ${{ startsWith(secrets.AWS_ROLE, 'arn:aws:iam::') && secrets.AWS_ROLE || format('arn:aws:iam::{0}:role/{1}', secrets.AWS_ACCOUNT_ID, secrets.AWS_ROLE) }}

    steps:

      - uses: actions/checkout@v4

      - name: Validate AWS role ARN
        run: |
          if [[ -z "$AWS_ROLE_TO_ASSUME" ]]; then
            echo "AWS role is empty. Configure AWS_ROLE (role ARN or role name) secret."
            exit 1
          fi

          if [[ ! "$AWS_ROLE_TO_ASSUME" =~ ^arn:aws:iam::[0-9]{12}:role/.+ ]]; then
            echo "Invalid role ARN: $AWS_ROLE_TO_ASSUME"
            echo "Expected format: arn:aws:iam::<12-digit-account-id>:role/<role-name>"
            echo "If AWS_ROLE is only the role name, also set AWS_ACCOUNT_ID secret."
            exit 1
          fi

      - name: Login AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build docker image
        run: |
          docker build -t event-api .

      - name: Tag image
        run: |
          docker tag event-api:latest ${{ secrets.ECR_REPOSITORY }}:latest

      - name: Push image
        run: |
          docker push ${{ secrets.ECR_REPOSITORY }}:latest

      - name: Deploy ECS
        run: |
          aws ecs update-service \
            --cluster event_management_cluster-ecs \
            --service event_management_service \
            --force-new-deployment